# IronClaw 配置示例

llm:
  provider: claude
  api_key: "${ANTHROPIC_API_KEY}"
  model: claude-sonnet-4-20250514
  max_tokens: 8192

telegram:
  token: "${TELEGRAM_BOT_TOKEN}"
  allowed_user_ids:
    - 123456789

agent:
  max_iterations: 20
  system_prompt: |
    You are IronClaw, a helpful AI assistant with access to tools.
    You can execute shell commands, read/write files, and make HTTP requests.
    Always explain what you're about to do before using tools.

store:
  path: "./data/ironclaw.db"

memory:
  enabled: true
  embedding_model: text-embedding-3-small  # 或 text-embedding-3-large（3072维，更高精度）
  openai_api_key: ${OPENAI_API_KEY}

scheduler:
  enabled: true

tools:
  bash:
    enabled: true
    timeout: 30s
    requires_approval: true
    blocked_commands:
      - "rm -rf /"
      - "shutdown"
      - "reboot"
      - "mkfs"
  file:
    enabled: true
    requires_approval: false
  http:
    enabled: true
    requires_approval: false
    timeout: 30s
  # MCP (Model Context Protocol) 工具集成
  # 通过 STDIO 传输连接外部 MCP Server，动态加载工具
  # 工具命名格式: mcp_{server名}_{tool名}
  mcp:
    servers:
      # GitHub MCP Server 示例
      # github:
      #   command: "docker"
      #   args: ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
      #   env:
      #     GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
      #   requires_approval: true
      # Filesystem MCP Server 示例
      # filesystem:
      #   command: "npx"
      #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
      #   requires_approval: false

server:
  addr: ":8080"
  enabled: false

log:
  level: info
  format: text
