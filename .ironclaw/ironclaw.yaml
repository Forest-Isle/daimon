# Generated from /Users/wuqisen/.ironclaw/config.yaml.
# Edit this file for project-specific overrides.
# Remove this file to fall back to the global config.

# IronClaw configuration — generated by setup wizard.
# Edit this file to adjust settings. Secrets should use ${ENV_VAR} placeholders.
#
# Project-specific overrides: create .ironclaw/ironclaw.yaml in your
# project directory. It merges on top of this global config.

llm:
  provider: claude
  api_key: "sk-xxx"
  model: claude-sonnet-4-20250514
  max_tokens: 8192

tui:
  auto_approve: false

agent:
  max_iterations: 20
  mode: simple
  compression:
    strategy: layered
    layers:
      tool_output_reduce_pct: 30
      summarize_pct: 60
      emergency_pct: 85
    token_estimate_ratio: 0.25

store:
  path: "./data/ironclaw.db"

memory:
  storage_type: file
  storage_dir: ~/.ironclaw/memory
  embedding_model: text-embedding-3-small
  openai_api_key: ${OPENAI_API_KEY}

tools:
  bash:
    enabled: true
    timeout: 30s
    requires_approval: true
  file:
    enabled: true
    requires_approval: false
  http:
    enabled: true
    requires_approval: false
    timeout: 30s
  concurrent_execution:
    enabled: true
    max_concurrency: 4
  result_persistence:
    enabled: true
    threshold_bytes: 8192
    preview_chars: 2000
    ttl_hours: 24

permissions:
  default: approve
  rules:
    - tool: bash
      pattern: "git *"
      action: none
    - tool: bash
      pattern: "rm -rf *"
      action: deny
    - tool: file
      path_pattern: "/etc/*"
      action: deny

hooks:
  pre_tool_use:
    - type: safety_analyzer
      config:
        block_patterns:
          - "rm -rf /"
          - "DROP TABLE"
  post_tool_use:
    - type: audit_logger
  on_user_message:
    - type: git_context
      config:
        timeout_ms: 2000
        include_diff_stat: false
    - type: workdir_context
      config:
        include_ls: true
        max_files: 20

log:
  level: info
  format: text
