version: "2"
run:
  modules-download-mode: readonly
  tests: true
output:
  formats:
    text:
      path: stdout
linters:
  enable:
    - dupl
    - gocognit
    - gosec
    - misspell
  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 120
      statements: 60
    gocognit:
      min-complexity: 30
    gosec:
      excludes:
        - G104
    staticcheck:
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - gosec
        path: _test\.go
      - path: _test\.go
        text: G306|G404
      - linters:
          - funlen
        path: examples/
      - linters:
          - funlen
          - gocognit
        path: internal/eval/fixtures
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
