name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Lint is currently non-blocking: it surfaces a backlog of pre-existing
    # issues that predate the toolchain fix. Remove continue-on-error once the
    # backlog is cleared so regressions start failing CI again.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  arch:
    name: Layer Boundaries
    runs-on: ubuntu-latest
    # Blocking, unlike the general lint job above. Runs ONLY the depguard rules
    # that enforce the layered dependency direction (inner packages must not
    # import the gateway composition root or the concrete delivery channels).
    # This is isolated from the lint backlog so layer regressions fail CI even
    # while the rest of the lint findings remain non-blocking.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --enable-only=depguard ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: make test

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go vet
        run: make vet

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (binary only)
        run: make build-bin
