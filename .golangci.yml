version: "2"
run:
  modules-download-mode: readonly
  tests: true
output:
  formats:
    text:
      path: stdout
linters:
  enable:
    - depguard
    - dupl
    - gocognit
    - gosec
    - misspell
  settings:
    depguard:
      # Enforce the layered dependency direction: the gateway composition root
      # and the concrete delivery channels are outer layers. Inner packages
      # (domain/infra) must never import them — dependencies flow outward→inward
      # only. Inner code depending on the internal/channel *port* interface is
      # allowed (and intended); only the concrete delivery implementations are
      # off-limits. cmd/ is the outermost layer and is exempt (not matched).
      rules:
        layer-no-gateway:
          list-mode: lax
          files:
            - "**/internal/**"
            - "!**/internal/gateway/**"
          deny:
            - pkg: github.com/Forest-Isle/daimon/internal/gateway
              desc: "layer violation: only cmd/ may import internal/gateway; inner packages must not depend on the composition root"
        layer-no-delivery:
          list-mode: lax
          files:
            - "**/internal/**"
            - "!**/internal/gateway/**"
            - "!**/internal/channel/**"
          deny:
            - pkg: github.com/Forest-Isle/daimon/internal/channel/tui
              desc: "layer violation: import the internal/channel port interface, not the TUI delivery implementation"
            - pkg: github.com/Forest-Isle/daimon/internal/channel/telegram
              desc: "layer violation: import the internal/channel port interface, not the Telegram delivery implementation"
            - pkg: github.com/Forest-Isle/daimon/internal/channel/scheduler
              desc: "layer violation: import the internal/channel port interface, not the scheduler delivery implementation"
    dupl:
      threshold: 100
    funlen:
      lines: 120
      statements: 60
    gocognit:
      min-complexity: 30
    gosec:
      excludes:
        - G104
    staticcheck:
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - gosec
        path: _test\.go
      - path: _test\.go
        text: G306|G404
      - linters:
          - funlen
        path: examples/
      - linters:
          - funlen
          - gocognit
        path: internal/eval/fixtures
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
