# IronClaw 配置示例

llm:
  provider: claude
  api_key: "${ANTHROPIC_API_KEY}"
  # base_url: "https://your-relay.example.com"  # 使用中转站时设置此项
  model: claude-sonnet-4-20250514
  max_tokens: 8192

telegram:
  token: "${TELEGRAM_BOT_TOKEN}"
  allowed_user_ids:
    - 123456789

agent:
  max_iterations: 20
  mode: simple   # "simple" | "cognitive"
  cognitive:
    # plan_model: ""          # defaults to llm.model if empty
    # reflect_model: ""       # defaults to llm.model if empty
    confidence_threshold: 0.6
    max_parallel_tools: 3
    max_replan_attempts: 2
    plan_max_tokens: 2048
    reflect_max_tokens: 1024
    approval_timeout_seconds: 120
  # 强化学习系统 - 自适应工具选择、Plan 策略优化、Replan 决策
  rl:
    enabled: false
    cold_start_episodes: 1000        # 冷启动数据收集数量
    exploration_rate: 0.2            # 初始探索率
    exploration_decay: 0.9995        # 探索率衰减
    update_frequency: 10             # 每 N 个 Episode 更新策略
    checkpoint_frequency: 100        # 每 N 个 Episode 保存 checkpoint
    bandit:
      enabled: true
      prior_alpha: 1.0               # Beta 分布先验 α
      prior_beta: 1.0                # Beta 分布先验 β
    ppo:
      enabled: true
      learning_rate: 0.0003
      clip_epsilon: 0.2
      epochs: 4
      batch_size: 64
      gamma: 0.99
      gae_lambda: 0.95
    dqn:
      enabled: true
      learning_rate: 0.001
      gamma: 0.99
      epsilon_start: 0.9
      epsilon_end: 0.05
      epsilon_decay: 0.995
      target_update_freq: 500
      buffer_size: 10000
    reward:
      task_success_weight: 0.5
      efficiency_weight: 0.3
      safety_weight: 0.15
      user_satisfaction_weight: 0.05
  system_prompt: |
    You are IronClaw, a helpful AI assistant with access to tools.
    You can execute shell commands, read/write files, and make HTTP requests.
    Always explain what you're about to do before using tools.

store:
  path: "./data/ironclaw.db"

memory:
  enabled: true
  embedding_model: text-embedding-3-small  # 或 text-embedding-3-large（3072维，更高精度）
  openai_api_key: ${OPENAI_API_KEY}
  # fact_extraction: true          # 启用 mem0 风格的事实提取
  # similarity_threshold: 0.85     # 去重阈值
  # bm25_weight: 0.4               # BM25 权重
  # vector_weight: 0.6             # 向量权重

  # 性能优化配置
  # enable_vss: true               # 启用 HNSW 索引（需要 sqlite-vss 扩展）
  # vector_dimension: 1536         # 向量维度（text-embedding-3-small: 1536, 3-large: 3072）
  # enable_search_cache: true      # 启用搜索结果缓存
  # search_cache_size: 500         # 缓存查询数量
  # search_cache_ttl: 5m           # 缓存过期时间

# 知识库 - 文档摄入 + BM25/向量混合检索
knowledge:
  enabled: false
  chunk_size: 512
  chunk_overlap: 64
  bm25_weight: 0.4
  vector_weight: 0.6
  graph_enabled: false              # 启用知识图谱（实体/关系抽取）
  ingest_dirs:                      # 启动时自动摄入的目录
    # - "./docs"
    # - "./knowledge"
  reranker:
    enabled: false
    provider: llm                   # "llm" 或 "none"

  # 性能优化配置
  # enable_search_cache: true      # 启用搜索结果缓存
  # search_cache_size: 500         # 缓存查询数量
  # search_cache_ttl: 5m           # 缓存过期时间

scheduler:
  enabled: true

tools:
  bash:
    enabled: true
    timeout: 30s
    requires_approval: true
    blocked_commands:
      - "rm -rf /"
      - "shutdown"
      - "reboot"
      - "mkfs"
  file:
    enabled: true
    requires_approval: false
  http:
    enabled: true
    requires_approval: false
    timeout: 30s
  # MCP (Model Context Protocol) 工具集成
  # 通过 STDIO 传输连接外部 MCP Server，动态加载工具
  # 工具命名格式: mcp_{server名}_{tool名}
  mcp:
    servers:
      # GitHub MCP Server 示例
      # github:
      #   command: "docker"
      #   args: ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
      #   env:
      #     GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
      #   requires_approval: true
      # Filesystem MCP Server 示例
      # filesystem:
      #   command: "npx"
      #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
      #   requires_approval: false

server:
  addr: ":8080"
  enabled: false

log:
  level: info
  format: text
